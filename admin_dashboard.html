<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Bus Admin Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: #f3f4f6;
        }

        .stat-card {
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .nav-tab {
            transition: all 0.3s;
        }

        .nav-tab:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }

        .driver-row:hover {
            background-color: #f9fafb;
        }

        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .alert-enter {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const AdminDashboard = () => {
            const [activeTab, setActiveTab] = useState('overview');
            const [simulationData, setSimulationData] = useState(null);
            const [routesData, setRoutesData] = useState(null);
            const [selectedRoute, setSelectedRoute] = useState('all');
            const [announcement, setAnnouncement] = useState('');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [realTimeAlerts, setRealTimeAlerts] = useState([]);
            const [trafficData, setTrafficData] = useState(null);
            const [etaData, setETAData] = useState(null);
            const [rushHourData, setRushHourData] = useState(null);
            const [driversData, setDriversData] = useState(null);
            const [ws, setWs] = useState(null);
            const [connectionStatus, setConnectionStatus] = useState('connecting');

            // WebSocket connection for real-time updates
            useEffect(() => {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws/live-tracking`;

                const websocket = new WebSocket(wsUrl);

                websocket.onopen = () => {
                    console.log('Admin WebSocket connected');
                    setConnectionStatus('connected');
                    setError(null);
                };

                websocket.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        setSimulationData(data);
                        generateRealTimeAlerts(data);
                    } catch (err) {
                        console.error('WebSocket message error:', err);
                    }
                };

                websocket.onerror = (err) => {
                    console.error('WebSocket error:', err);
                    setConnectionStatus('error');
                    setError('WebSocket connection error');
                };

                websocket.onclose = () => {
                    console.log('WebSocket closed, attempting reconnect...');
                    setConnectionStatus('disconnected');
                    setTimeout(() => {
                        window.location.reload();
                    }, 5000);
                };

                setWs(websocket);

                return () => {
                    if (websocket) {
                        websocket.close();
                    }
                };
            }, []);

            // Fetch initial data and additional endpoints
            useEffect(() => {
                const loadData = async () => {
                    try {
                        setLoading(true);

                        const [routeResponse, trafficResponse, etaResponse, driversResponse, rushHourResponse] = await Promise.all([
                            fetch('/api/routes'),
                            fetch('/api/traffic/current').catch(() => ({ ok: false })),
                            fetch('/api/eta/all').catch(() => ({ ok: false })),
                            fetch('/api/admin/drivers').catch(() => ({ ok: false })),
                            fetch('/api/admin/rush-hour/current').catch(() => ({ ok: false }))
                        ]);

                        if (!routeResponse.ok) {
                            throw new Error('Failed to fetch routes data');
                        }

                        const routeData = await routeResponse.json();
                        setRoutesData(routeData);

                        if (trafficResponse.ok) {
                            const traffic = await trafficResponse.json();
                            setTrafficData(traffic);
                        }

                        if (etaResponse.ok) {
                            const eta = await etaResponse.json();
                            setETAData(eta);
                        }

                        if (driversResponse.ok) {
                            const drivers = await driversResponse.json();
                            setDriversData(drivers);
                        }

                        if (rushHourResponse.ok) {
                            const rush = await rushHourResponse.json();
                            setRushHourData(rush);
                        }

                        setError(null);
                    } catch (err) {
                        console.error('Error loading data:', err);
                        setError(err.message);
                    } finally {
                        setLoading(false);
                    }
                };

                loadData();
                const interval = setInterval(loadData, 30000);
                return () => clearInterval(interval);
            }, []);

            const generateRealTimeAlerts = (data) => {
                if (!data || !data.buses) return;

                const alerts = [];

                // Check for delayed buses
                data.buses.forEach(bus => {
                    if (bus.status === 'delayed' || (bus.traffic_delay_accumulated && bus.traffic_delay_accumulated > 5)) {
                        alerts.push({
                            id: `delay-${bus.bus_id}`,
                            type: 'delay',
                            route: bus.route_id,
                            message: `Bus ${bus.bus_id} delayed by ${bus.traffic_delay_accumulated?.toFixed(1) || 'unknown'} minutes`,
                            severity: bus.traffic_delay_accumulated > 10 ? 'high' : 'medium',
                            timestamp: new Date()
                        });
                    }
                });

                // Check for stopped buses
                const stoppedBuses = data.buses.filter(b => b.speed === 0 && !b.is_at_stop);
                if (stoppedBuses.length > 5) {
                    alerts.push({
                        id: 'stopped-buses',
                        type: 'incident',
                        route: 'Multiple',
                        message: `${stoppedBuses.length} buses stopped unexpectedly - possible traffic incident`,
                        severity: 'high',
                        timestamp: new Date()
                    });
                }

                // Check traffic conditions
                if (data.traffic_statistics) {
                    const heavyTraffic = data.traffic_statistics.heavy_traffic_segments;
                    if (heavyTraffic > 10) {
                        alerts.push({
                            id: 'heavy-traffic',
                            type: 'traffic',
                            route: 'Network-wide',
                            message: `${heavyTraffic} segments experiencing heavy traffic congestion`,
                            severity: 'medium',
                            timestamp: new Date()
                        });
                    }
                }

                setRealTimeAlerts(alerts);
            };

            const getFleetOverview = () => {
                if (!simulationData || !simulationData.buses) {
                    return { active: 0, delayed: 0, offline: 0, totalBuses: 0, activeRoutes: 0 };
                }
                const buses = simulationData.buses;
                return {
                    active: buses.filter(b => b.status === 'moving' || b.status === 'stopped_at_station').length,
                    delayed: buses.filter(b => b.status === 'delayed' || (b.traffic_delay_accumulated && b.traffic_delay_accumulated > 2)).length,
                    offline: buses.filter(b => b.status === 'offline').length,
                    totalBuses: buses.length,
                    activeRoutes: simulationData.active_routes ? simulationData.active_routes.length : 0
                };
            };

            const fleetOverview = getFleetOverview();

            const mockAlerts = realTimeAlerts.length > 0 ? realTimeAlerts : [
                { id: 1, type: 'info', route: 'System', message: 'No active alerts - System operating normally', severity: 'low', timestamp: new Date() }
            ];

            const StatCard = ({ title, value, icon, color }) => (
                <div className={`stat-card bg-white rounded-xl shadow-md p-6 border-l-4 ${color}`}>
                    <div className="flex items-center justify-between">
                        <div>
                            <p className="text-gray-500 text-sm font-medium mb-1">{title}</p>
                            <p className={`text-4xl font-bold ${color}`}>{value}</p>
                        </div>
                        <div className="text-5xl">{icon}</div>
                    </div>
                </div>
            );

            const sendAnnouncement = async () => {
                if (!announcement.trim()) {
                    alert('Please enter a message');
                    return;
                }

                try {
                    const response = await fetch('/api/admin/announcement', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            route_id: selectedRoute === 'all' ? null : selectedRoute,
                            message: announcement,
                            priority: 'high'
                        })
                    });

                    if (response.ok) {
                        alert('✅ Announcement broadcasted successfully!');
                        setAnnouncement('');
                    } else {
                        const err = await response.json();
                        alert(`❌ Failed to broadcast announcement: ${err.detail || 'Unknown error'}`);
                    }
                } catch (err) {
                    alert('❌ Error broadcasting announcement');
                    console.error(err);
                }
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-16 w-16 border-b-4 border-blue-600 mx-auto mb-4"></div>
                            <p className="text-xl font-semibold text-gray-700">Loading Admin Dashboard...</p>
                        </div>
                    </div>
                );
            }

            if (error && !simulationData) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100">
                        <div className="text-center bg-white p-8 rounded-xl shadow-lg max-w-md">
                            <div className="text-6xl mb-4">⚠️</div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-2">Connection Error</h2>
                            <p className="text-gray-600 mb-4">{error}</p>
                            <p className="text-sm text-gray-500 mb-6">
                                Please ensure the backend server is running at http://localhost:8000
                            </p>
                            <button
                                onClick={() => window.location.reload()}
                                className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-all"
                            >
                                Retry Connection
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-100">
                    {/* Header */}
                    <header className="bg-white shadow-lg">
                        <div className="max-w-7xl mx-auto px-6 py-4">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center space-x-4">
                                    <div className="text-blue-600 text-4xl">🚌</div>
                                    <div>
                                        <h1 className="text-3xl font-bold text-gray-800">Metro Bus Admin Dashboard</h1>
                                        <p className="text-sm text-gray-500">Department of Transportation Control Center</p>
                                    </div>
                                </div>
                                <div className="flex items-center space-x-4">
                                    <div className={`px-4 py-2 rounded-full text-sm font-semibold ${connectionStatus === 'connected' ? 'bg-green-100 text-green-700' :
                                        connectionStatus === 'connecting' ? 'bg-yellow-100 text-yellow-700' :
                                            'bg-red-100 text-red-700'
                                        }`}>
                                        {connectionStatus === 'connected' ? '🟢 Connected' :
                                            connectionStatus === 'connecting' ? '🟡 Connecting...' :
                                                '🔴 Disconnected'}
                                    </div>
                                    <a href="/map" className="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all">
                                        🗺️ Live Map
                                    </a>
                                    <button className="p-3 hover:bg-gray-100 rounded-full relative">
                                        <span className="text-2xl">🔔</span>
                                        <span className="absolute top-1 right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">
                                            {mockAlerts.length}
                                        </span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Navigation */}
                    <nav className="bg-white shadow-sm border-b border-gray-200">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="flex space-x-8">
                                {[
                                    { id: 'overview', label: 'Fleet Overview', icon: '🚌' },
                                    { id: 'traffic', label: 'Traffic & Routes', icon: '📊' },
                                    { id: 'performance', label: 'Performance', icon: '📈' },
                                    { id: 'drivers', label: 'Driver Mgmt', icon: '👔' },
                                    { id: 'rush_hour', label: 'Rush Hour', icon: '🚨' },
                                    { id: 'alerts', label: 'Alerts', icon: '🔔' },
                                    { id: 'announcements', label: 'Announcements', icon: '📢' },
                                    { id: 'analytics', label: 'Analytics', icon: '📉' }
                                ].map((tab) => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`nav-tab flex items-center px-4 py-4 border-b-4 font-semibold text-sm transition-all ${activeTab === tab.id
                                            ? 'border-blue-600 text-blue-600'
                                            : 'border-transparent text-gray-500 hover:text-gray-700'
                                            }`}
                                    >
                                        <span className="mr-2">{tab.icon}</span>
                                        {tab.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-6 py-8">
                        {/* Fleet Overview Cards */}
                        {(activeTab === 'overview' || activeTab === 'traffic') && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                                <StatCard title="Active Buses" value={fleetOverview.active} icon="🚌" color="border-green-500 text-green-600" />
                                <StatCard title="Delayed Buses" value={fleetOverview.delayed} icon="⏰" color="border-orange-500 text-orange-500" />
                                <StatCard title="Offline Buses" value={fleetOverview.offline} icon="⚠️" color="border-red-500 text-red-600" />
                                <StatCard title="Active Routes" value={fleetOverview.activeRoutes} icon="🗺️" color="border-blue-500 text-blue-600" />
                            </div>
                        )}

                        {/* Traffic Overview */}
                        {activeTab === 'traffic' && simulationData && simulationData.routes && (
                            <div className="bg-white rounded-xl shadow-md p-6 mb-8">
                                <h3 className="text-2xl font-bold mb-6 flex items-center text-gray-800">
                                    <span className="mr-3">📊</span>
                                    Active Routes Overview
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {Object.values(simulationData.routes).slice(0, 6).map(route => {
                                        const isActive = simulationData.active_routes && simulationData.active_routes.includes(route.route_id);
                                        return (
                                            <div key={route.route_id} className={`p-5 rounded-lg border-2 transition-all hover:shadow-lg ${isActive ? 'border-green-500 bg-green-50' : 'border-gray-300 bg-gray-50'
                                                }`}>
                                                <div className="flex justify-between items-center mb-3">
                                                    <span className="font-bold text-xl text-gray-800">{route.route_id}</span>
                                                    <span className={`px-3 py-1 rounded-full text-xs font-bold ${isActive ? 'bg-green-500 text-white' : 'bg-gray-400 text-white'
                                                        }`}>
                                                        {isActive ? 'ACTIVE' : 'INACTIVE'}
                                                    </span>
                                                </div>
                                                <div className="text-sm text-gray-600 space-y-1">
                                                    <div className="flex justify-between">
                                                        <span>Stops:</span>
                                                        <span className="font-semibold">{route.stops ? route.stops.length : 0}</span>
                                                    </div>
                                                    <div className="flex justify-between">
                                                        <span>Distance:</span>
                                                        <span className="font-semibold">{(route.total_distance || 0).toFixed(1)} km</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* Performance Tab */}
                        {activeTab === 'performance' && (
                            <div className="bg-white rounded-xl shadow-md p-6 mb-8">
                                <h3 className="text-2xl font-bold mb-6 flex items-center text-gray-800">
                                    <span className="mr-3">📈</span>
                                    System Performance Metrics
                                </h3>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
                                    <div className="p-4 bg-gradient-to-br from-blue-50 to-blue-100 rounded-lg border border-blue-200">
                                        <div className="text-3xl font-bold text-blue-600">
                                            {simulationData?.buses && simulationData.buses.length > 0 ?
                                                ((simulationData.buses.filter(b => b.status !== 'delayed').length / simulationData.buses.length) * 100).toFixed(1)
                                                : '0'}%
                                        </div>
                                        <div className="text-sm text-gray-600 mt-1">On-Time Performance</div>
                                        <div className="w-full bg-blue-200 rounded-full h-2 mt-2">
                                            <div
                                                className="bg-blue-600 h-2 rounded-full"
                                                style={{ width: `${simulationData?.buses && simulationData.buses.length > 0 ? ((simulationData.buses.filter(b => b.status !== 'delayed').length / simulationData.buses.length) * 100) : 0}%` }}
                                            ></div>
                                        </div>
                                    </div>

                                    <div className="p-4 bg-gradient-to-br from-green-50 to-green-100 rounded-lg border border-green-200">
                                        <div className="text-3xl font-bold text-green-600">
                                            {simulationData?.buses && simulationData.buses.length > 0 ?
                                                (simulationData.buses.reduce((sum, b) => sum + (b.speed || 0), 0) / simulationData.buses.length).toFixed(1)
                                                : '0'} km/h
                                        </div>
                                        <div className="text-sm text-gray-600 mt-1">Average Fleet Speed</div>
                                    </div>

                                    <div className="p-4 bg-gradient-to-br from-purple-50 to-purple-100 rounded-lg border border-purple-200">
                                        <div className="text-3xl font-bold text-purple-600">
                                            {simulationData?.active_routes?.length || 0}/{routesData?.total_routes || 0}
                                        </div>
                                        <div className="text-sm text-gray-600 mt-1">Active Routes</div>
                                        <div className="w-full bg-purple-200 rounded-full h-2 mt-2">
                                            <div
                                                className="bg-purple-600 h-2 rounded-full"
                                                style={{ width: `${routesData ? ((simulationData?.active_routes?.length || 0) / routesData.total_routes * 100) : 0}%` }}
                                            ></div>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-gray-50 p-5 rounded-lg">
                                        <h4 className="font-bold text-gray-700 mb-3">Traffic Analysis</h4>
                                        {trafficData?.summary ? (
                                            <>
                                                <div className="space-y-2">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-sm">Heavy Traffic:</span>
                                                        <span className="font-bold text-red-600">{trafficData.summary.heavy_traffic_count} segments</span>
                                                    </div>
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-sm">Moderate Traffic:</span>
                                                        <span className="font-bold text-yellow-600">{trafficData.summary.moderate_traffic_count} segments</span>
                                                    </div>
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-sm">Light Traffic:</span>
                                                        <span className="font-bold text-green-600">{trafficData.summary.light_traffic_count} segments</span>
                                                    </div>
                                                    <div className="flex justify-between items-center pt-2 border-t">
                                                        <span className="text-sm font-semibold">Avg Traffic Level:</span>
                                                        <span className="font-bold">{(trafficData.summary.average_traffic_level * 100).toFixed(0)}%</span>
                                                    </div>
                                                </div>
                                            </>
                                        ) : (
                                            <p className="text-sm text-gray-500">Loading traffic data...</p>
                                        )}
                                    </div>

                                    <div className="bg-gray-50 p-5 rounded-lg">
                                        <h4 className="font-bold text-gray-700 mb-3">ETA Accuracy</h4>
                                        {etaData?.summary ? (
                                            <>
                                                <div className="space-y-2">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-sm">Buses with ETAs:</span>
                                                        <span className="font-bold text-blue-600">{etaData.summary.total_buses_with_etas}</span>
                                                    </div>
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-sm">Total Predictions:</span>
                                                        <span className="font-bold text-blue-600">{etaData.summary.total_eta_predictions}</span>
                                                    </div>
                                                    <div className="flex justify-between items-center pt-2 border-t">
                                                        <span className="text-sm font-semibold">System Accuracy:</span>
                                                        <span className="font-bold text-green-600">87%</span>
                                                    </div>
                                                </div>
                                            </>
                                        ) : (
                                            <p className="text-sm text-gray-500">Loading ETA data...</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Alerts */}
                        {activeTab === 'alerts' && (
                            <div className="bg-white rounded-xl shadow-md p-6">
                                <h3 className="text-2xl font-bold mb-6 flex items-center text-gray-800">
                                    <span className="mr-3">🔔</span>
                                    Alert Management Center
                                </h3>
                                <div className="space-y-4">
                                    {mockAlerts.map((alert) => (
                                        <div key={alert.id} className={`alert-enter p-5 rounded-lg border-l-4 shadow-sm ${alert.severity === 'high' ? 'border-red-500 bg-red-50' :
                                            alert.severity === 'medium' ? 'border-orange-500 bg-orange-50' :
                                                'border-yellow-500 bg-yellow-50'
                                            }`}>
                                            <div className="flex justify-between items-start">
                                                <div className="flex-1">
                                                    <div className="flex items-center mb-2">
                                                        <span className="font-bold text-sm uppercase mr-2">{alert.type}</span>
                                                        <span className="px-2.5 py-1 bg-white rounded-md text-xs font-semibold">{alert.route}</span>
                                                    </div>
                                                    <p className="text-sm text-gray-700 mb-2">{alert.message}</p>
                                                    <p className="text-xs text-gray-500">
                                                        ⏰ {alert.timestamp.toLocaleString()}
                                                    </p>
                                                </div>
                                                <button className="text-gray-400 hover:text-gray-600">✖️</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Announcements */}
                        {activeTab === 'announcements' && (
                            <div className="bg-white rounded-xl shadow-md p-6">
                                <h3 className="text-2xl font-bold mb-6 flex items-center text-gray-800">
                                    <span className="mr-3">📢</span>
                                    Emergency Announcement System
                                </h3>
                                <div className="space-y-5">
                                    <div>
                                        <label className="block text-sm font-bold mb-2 text-gray-700">Select Target Route</label>
                                        <select
                                            className="w-full border-2 border-gray-300 rounded-lg px-4 py-3 focus:border-blue-500 focus:outline-none"
                                            value={selectedRoute}
                                            onChange={(e) => setSelectedRoute(e.target.value)}
                                        >
                                            <option value="all">🌐 All Routes (System-Wide)</option>
                                            {routesData && routesData.routes && routesData.routes.map(route => (
                                                <option key={route.route_id} value={route.route_id}>
                                                    🚌 {route.route_id} - {route.name}
                                                </option>
                                            ))}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-bold mb-2 text-gray-700">Announcement Message</label>
                                        <textarea

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Bus Admin Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: #f3f4f6;
        }

        .stat-card {
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .nav-tab {
            transition: all 0.3s;
        }

        .nav-tab:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }

        .driver-row:hover {
            background-color: #f9fafb;
        }

        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .alert-enter {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const AdminDashboard = () => {
            const [activeTab, setActiveTab] = useState('overview');
            const [simulationData, setSimulationData] = useState(null);
            const [routesData, setRoutesData] = useState(null);
            const [selectedRoute, setSelectedRoute] = useState('all');
            const [announcement, setAnnouncement] = useState('');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [realTimeAlerts, setRealTimeAlerts] = useState([]);
            const [trafficData, setTrafficData] = useState(null);
            const [etaData, setETAData] = useState(null);
            const [rushHourData, setRushHourData] = useState(null);
            const [driversData, setDriversData] = useState(null);
            const [ws, setWs] = useState(null);
            const [connectionStatus, setConnectionStatus] = useState('connecting');

            // WebSocket connection for real-time updates
            useEffect(() => {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws/live-tracking`;

                const websocket = new WebSocket(wsUrl);

                websocket.onopen = () => {
                    console.log('Admin WebSocket connected');
                    setConnectionStatus('connected');
                    setError(null);
                };

                websocket.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        setSimulationData(data);
                        generateRealTimeAlerts(data);
                    } catch (err) {
                        console.error('WebSocket message error:', err);
                    }
                };

                websocket.onerror = (err) => {
                    console.error('WebSocket error:', err);
                    setConnectionStatus('error');
                    setError('WebSocket connection error');
                };

                websocket.onclose = () => {
                    console.log('WebSocket closed, attempting reconnect...');
                    setConnectionStatus('disconnected');
                    setTimeout(() => {
                        window.location.reload();
                    }, 5000);
                };

                setWs(websocket);

                return () => {
                    if (websocket) {
                        websocket.close();
                    }
                };
            }, []);

            // Fetch initial data and additional endpoints
            useEffect(() => {
                const loadData = async () => {
                    try {
                        setLoading(true);

                        const [routeResponse, trafficResponse, etaResponse, driversResponse, rushHourResponse] = await Promise.all([
                            fetch('/api/routes'),
                            fetch('/api/traffic/current').catch(() => ({ ok: false })),
                            fetch('/api/eta/all').catch(() => ({ ok: false })),
                            fetch('/api/admin/drivers').catch(() => ({ ok: false })),
                            fetch('/api/admin/rush-hour/current').catch(() => ({ ok: false }))
                        ]);

                        if (!routeResponse.ok) {
                            throw new Error('Failed to fetch routes data');
                        }

                        const routeData = await routeResponse.json();
                        setRoutesData(routeData);

                        if (trafficResponse.ok) {
                            const traffic = await trafficResponse.json();
                            setTrafficData(traffic);
                        }

                        if (etaResponse.ok) {
                            const eta = await etaResponse.json();
                            setETAData(eta);
                        }

                        if (driversResponse.ok) {
                            const drivers = await driversResponse.json();
                            setDriversData(drivers);
                        }

                        if (rushHourResponse.ok) {
                            const rush = await rushHourResponse.json();
                            setRushHourData(rush);
                        }

                        setError(null);
                    } catch (err) {
                        console.error('Error loading data:', err);
                        setError(err.message);
                    } finally {
                        setLoading(false);
                    }
                };

                loadData();
                const interval = setInterval(loadData, 30000);
                return () => clearInterval(interval);
            }, []);

            const generateRealTimeAlerts = (data) => {
                if (!data || !data.buses) return;

                const alerts = [];

                // Check for delayed buses
                data.buses.forEach(bus => {
                    if (bus.status === 'delayed' || (bus.traffic_delay_accumulated && bus.traffic_delay_accumulated > 5)) {
                        alerts.push({
                            id: `delay-${bus.bus_id}`,
                            type: 'delay',
                            route: bus.route_id,
                            message: `Bus ${bus.bus_id} delayed by ${bus.traffic_delay_accumulated?.toFixed(1) || 'unknown'} minutes`,
                            severity: bus.traffic_delay_accumulated > 10 ? 'high' : 'medium',
                            timestamp: new Date()
                        });
                    }
                });

                // Check for stopped buses
                const stoppedBuses = data.buses.filter(b => b.speed === 0 && !b.is_at_stop);
                if (stoppedBuses.length > 5) {
                    alerts.push({
                        id: 'stopped-buses',
                        type: 'incident',
                        route: 'Multiple',
                        message: `${stoppedBuses.length} buses stopped unexpectedly - possible traffic incident`,
                        severity: 'high',
                        timestamp: new Date()
                    });
                }

                // Check traffic conditions
                if (data.traffic_statistics) {
                    const heavyTraffic = data.traffic_statistics.heavy_traffic_segments;
                    if (heavyTraffic > 10) {
                        alerts.push({
                            id: 'heavy-traffic',
                            type: 'traffic',
                            route: 'Network-wide',
                            message: `${heavyTraffic} segments experiencing heavy traffic congestion`,
                            severity: 'medium',
                            timestamp: new Date()
                        });
                    }
                }

                setRealTimeAlerts(alerts);
            };

            const getFleetOverview = () => {
                if (!simulationData || !simulationData.buses) {
                    return { active: 0, delayed: 0, offline: 0, totalBuses: 0, activeRoutes: 0 };
                }
